<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Cobrinha</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a44 0%, #284574 100%);
            font-family: Arial, sans-serif;
        }

        .container { 
            text-align: center;
            background-color: #284574;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            color: white; 
        }

        #canvas {
            border: 3px solid #333;
            border-radius: 10px;
            background-color: white;
            display: block;
            margin: 20px auto;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }

        .pontuacao, .recorde {
            font-weight: bold;
            color: #ffcc00; 
        }

        button {
            font-size: 16px;
            cursor: pointer;
            background-color: #27ae60;
            padding: 12px 25px;
            color: white;
            border: none;
            border-radius: 8px; 
            margin: 5px;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #2ecc71;
            transform: scale(1.05);
        }

        /* estilização de teclas */
        .teclas {
            display: grid;
            grid-template-columns: repeat(3, 40px);
            gap: 5px;
            justify-content: center;
            margin-top: 15px;
        }
        .tecla {
            background: #333;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Jogo da Cobrinha</h1>
        
        <div class="info">
            <div class="pontuacao">Pontuação: <span id="pontos">0</span></div>
            <div class="recorde">Recorde: <span id="recorde">0</span></div>
        </div>

        <canvas id="canvas" width="400" height="400"></canvas>

        <div> 
            <button onclick="iniciarJogo()">Iniciar jogo</button>
            <button onclick="pausarJogo()">Pausar / Continuar</button>
        </div>

        <div class="teclas">
            <div class="tecla-vazia"></div>
            <div class="tecla">▲</div>
            <div class="tecla-vazia"></div>
            <div class="tecla">◀</div>
            <div class="tecla">▼</div>
            <div class="tecla">▶</div>
        </div>

        <div>
            <p> aodoasjdiasdiasjdaisjd </p>
        </div>
    </div>        

    <script> 
        function iniciarJogo(){
            alert('Jogo começou! (Lógica do Canvas será a próxima etapa)');
            console.log('Jogo começou!');
        }

        function pausarJogo(){
            console.log('Pausa no jogo!');
        }
    </script>
</body>
</html>
