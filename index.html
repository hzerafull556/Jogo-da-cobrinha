<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jogo da Cobrinha</title>

    <style>
        /* Fundo da página para destacar o container */
        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container { 
            text-align: center;
            /* Gradiente moderno entre roxo e azul escuro */
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 30px;
            border-radius: 20px;
            /* Brilho neon suave */
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.5), 0px 0px 20px rgba(78, 205, 196, 0.2);
            color: #e94560; /* Cor do título */
        }

        h1 {
            margin-top: 0;
            color: #4cc9f0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .info { 
            font-size: 1.2em;
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
        }

        .pontuacao {
            font-weight: bold;
            color: #4cc9f0; /* Azul neon */
        }

        .recorde {
            font-weight: bold;
            color: #f72585; /* Rosa neon */
        }

        #canvas {
            /* Borda sólida com cor neon e efeito de brilho */
            border: 4px solid #1f4068;
            border-radius: 10px;
            background-color: #1a1a2e;
            display: block;
            margin: 20px auto;
            box-shadow: inset 0px 0px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> &#128013; Jogo da cobrinha</h1>
        
        <div class="info">
            <div class="pontuacao">
                Pontuação: <span id="pontos">0</span>
            </div>
            <div class="recorde">
                Recorde: <span id="recorde">0</span>
            </div>
        </div>

        <canvas id="canvas" width="400" height="400"> 
            </canvas>
                
            <div>
                <button onclick="alert('Em construção')">Iniicar jogo</button>
                <button>pausar / container</button>

            </div>

    </div>        
</body>
</html>
