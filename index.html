<DOCTYPE html>

    <html lang="pt-br">
        <head>

        <meta charset="UTF-8">
        <meta name="vieweport" content="width=devide-width, initial-scale=1.0">

        <title>Jogo da Cobrinha</title>

        <style>

        .container { 
            text-align: center;
            background-color: black;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgb( black );
        }

        .info { 

        font-size: 1em;

        .pontuacao {

        #canvas{
            border: 3px solid #333;
            border-radius: 10px;
            background-color: white;
            display: block;

            margin: 20px auto;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }

        .controles{
            margin-top: 20px;

        }

        button{

        body {

            background: linear-gradient(135deg, #1a2a44 0%, #284574 100%);
            font-family: Arial, sans-serif;
                                                }   

        </style>

    </head>

            <canvas id="canvas" width="400" height="400">
