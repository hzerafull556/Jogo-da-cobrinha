<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jogo da Cobrinha</title>

    <style>

        .container { 
            text-align: center;
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.5), 0px 0px 20px rgba(78, 205, 196, 0.2);
            color: #e94560; 
        }
    

        .info { 
            font-size: 1.2em;
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
        }

        .pontuacao {
            font-weight: bold;
            color: #4cc9f0; 
        }

        .recorde {
            font-weight: bold;
            color: #f72585; 
        }

        #canvas {
            border: 4px solid #1f4068;
            border-radius: 10px;
            background-color: #1a1a2e;
            display: block;
            margin: 20px auto;
            box-shadow: inset 0px 0px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> &#128013; Jogo da cobrinha</h1>
        
        <div class="info">
            <div class="pontuacao">
                Pontuação: <span id="pontos">0</span>
            </div>
            <div class="recorde">
                Recorde: <span id="recorde">0</span>
            </div>
        </div>

        <canvas id="canvas" width="400" height="400"> 
            </canvas>

            <div>

                <button>Inciiar jogo</button>
                <button>Pausar Jogo</button>

            </div>
    </div>        
</body>
</html>
