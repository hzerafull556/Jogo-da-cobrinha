<style>
    body {
        background-color: #0f172a; /* Fundo da página azul marinho escuro */
        color: #f8fafc;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        text-align: center;
        background-color: #1e293b; /* Fundo do card */
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0px 20px 50px rgba(0, 0, 0, 0.5);
        border: 1px solid #334155;
    }

    h1 {
        margin-top: 0;
        color: #4ade80; /* Verde vibrante */
        text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
    }

    .info {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-bottom: 15px;
        font-size: 1.1em;
        background: #0f172a;
        padding: 10px;
        border-radius: 12px;
    }

    .pontuacao {
        font-weight: bold;
        color: #4ade80;
    }

    .recorde {
        font-weight: bold;
        color: #f87171; /* Vermelho moderno */
    }

    #canvas {
        border: 4px solid #334155;
        border-radius: 12px;
        background-color: #020617; /* Fundo do jogo quase preto */
        display: block;
        margin: 20px auto;
        box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.4);
    }

    button {
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        background-color: #3b82f6; /* Azul moderno */
        padding: 12px 20px;
        color: white;
        border: none;
        border-radius: 10px;
        margin: 5px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }

    button:hover {
        background-color: #2563eb;
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    button:active {
        transform: translateY(0);
    }

    .teclas {
        display: grid;
        grid-template-columns: repeat(3, 55px);
        gap: 8px;
        justify-content: center;
        margin: 25px auto;
    }

    .tecla {
        width: 55px;
        height: 55px;
        background-color: #334155;
        color: #f8fafc;
        border: none;
        cursor: pointer;
        border-radius: 12px;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        border-bottom: 4px solid #1e293b;
    }

    .tecla.vazia {
        background-color: transparent;
        border: none;
        cursor: default;
    }

    .tecla:hover:not(.vazia) {
        background-color: #475569;
    }

    .tecla:active:not(.vazia) {
        background-color: #4ade80;
        color: #064e3b;
        transform: translateY(2px);
        border-bottom-width: 0px;
    }

    h3 { color: #94a3b8; margin-bottom: 5px; }
    p { color: #64748b; font-size: 0.9em; margin: 5px 0; }
</style>
